services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pandora
      POSTGRES_PASSWORD: pandora
      POSTGRES_DB: pandora
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pandora"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://pandora:pandora@db:5432/pandora?schema=public"
      JWT_SECRET: "${JWT_SECRET:-change-me-to-a-strong-random-secret}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
